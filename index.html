<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
      #start-btn { padding: 15px 30px; background: #6b4f3f; color: white; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <p>اضغطي للتشغيل عبر شبكة الهاتف ✨</p>
      <button id="start-btn">ابدأ العرض</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="vid" src="./video.mp4" preload="auto" loop="true" muted crossorigin="anonymous" webkit-playsinline playsinline></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" position="0 0 0" height="0.6" width="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#overlay');
      const btn = document.querySelector('#start-btn');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#vid');

      btn.addEventListener('click', () => {
        overlay.style.display = 'none';
        sceneEl.systems["mindar-image-system"].start(); // بدء الكاميرا يدوياً
        video.play(); 
      });
    </script>
  </body>
</html>
